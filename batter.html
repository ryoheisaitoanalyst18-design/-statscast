<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打者詳細 — 東京六大学野球 StatCast</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div>
    <div class="logo">TOKYO BIG6 BASEBALL</div>
    <h1>⚾ StatCast</h1>
  </div>
</header>

<main>

  <a href="index.html" class="back-link">← 選手一覧に戻る</a>

  <!-- 打者ヘッダー -->
  <div class="batter-header">
    <h2 id="batter-name">読み込み中...</h2>
    <span class="batter-badge" id="batter-team"></span>
    <span class="batter-badge" id="batter-side"></span>
  </div>

  <!-- 基本成績 -->
  <div class="card">
    <h2>基本成績</h2>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">打数</div>
        <div class="stat-value" id="stat-ab">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">安打</div>
        <div class="stat-value" id="stat-hits">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">打率</div>
        <div class="stat-value" id="stat-ba">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">三振</div>
        <div class="stat-value" id="stat-k">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">四球</div>
        <div class="stat-value" id="stat-bb">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">空振り率</div>
        <div class="stat-value" id="stat-whiff">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">ゴロ率</div>
        <div class="stat-value" id="stat-gb">—</div>
      </div>
    </div>
  </div>

  <!-- コース別ヒートマップ -->
  <div class="chart-section">

    <div style="margin-bottom:12px">
      <div class="tab-group" role="tablist">
        <button class="tab-btn active" data-stat="ba"    role="tab">コース別打率</button>
        <button class="tab-btn"        data-stat="whiff" role="tab">空振り率</button>
        <button class="tab-btn"        data-stat="gb"    role="tab">ゴロ率</button>
      </div>
    </div>

    <div style="margin-bottom:14px">
      <div style="font-size:11px;color:#888;margin-bottom:5px">球種フィルター</div>
      <div class="tab-group" id="pitch-type-tabs" role="tablist">
        <button class="tab-btn active" data-type="all" role="tab">全球種</button>
      </div>
    </div>

    <h3 id="zone-chart-title">コース別打率</h3>

    <div class="chart-row">
      <div class="zone-chart-wrap">
        <canvas id="zone-canvas" width="360" height="400"
          aria-label="コース別ヒートマップ"></canvas>
      </div>

      <!-- 投球散布図 -->
      <div style="flex:1 1 300px">
        <h3 style="margin-bottom:8px">インパクトコース分布</h3>

        <div class="pitch-toggles">
          <label class="toggle-label">
            <input type="checkbox" id="toggle-hit" checked>
            <span class="toggle-dot hit"></span>安打
          </label>
          <label class="toggle-label">
            <input type="checkbox" id="toggle-swinging" checked>
            <span class="toggle-dot swinging"></span>空振り
          </label>
          <label class="toggle-label">
            <input type="checkbox" id="toggle-weak" checked>
            <span class="toggle-dot weak"></span>凡打
          </label>
        </div>

        <div class="pitch-plot-wrap">
          <canvas id="pitch-canvas" width="340" height="460"
            aria-label="投球散布図"></canvas>
        </div>

        <!-- 球種凡例 -->
        <div class="shape-legend" id="shape-legend"></div>
      </div>
    </div>

  </div><!-- /chart-section -->

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"
  integrity="sha512-dfX5uYVXzyU8+KHqj8bjo7UkOdg18PaOtpa48djpNbZHwExddghZ+ZmzWT06R5v6NSk3ZUfsH6FNEDepLx9hA=="
  crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="js/datastore.js"></script>
<script src="js/zoneChart.js"></script>
<script src="js/pitchPlot.js"></script>
<script src="js/batter.js"></script>
</body>
</html>
