<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投手詳細 — 東京六大学野球 StatCast</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div>
    <div class="logo">TOKYO BIG6 BASEBALL</div>
    <h1>⚾ StatCast</h1>
  </div>
</header>

<main>

  <a href="index.html" class="back-link">← 選手一覧に戻る</a>

  <!-- 投手ヘッダー -->
  <div class="batter-header">
    <h2 id="pitcher-name">読み込み中...</h2>
    <span class="batter-badge" id="pitcher-team"></span>
    <span class="batter-badge" id="pitcher-throws"></span>
  </div>

  <!-- 対左右別成績 -->
  <div class="card">
    <h2>対左右別成績</h2>
    <div class="table-wrap">
      <table class="splits-table">
        <thead>
          <tr>
            <th>指標</th>
            <th class="num">全体</th>
            <th class="num split-l">vs 左打者</th>
            <th class="num split-r">vs 右打者</th>
          </tr>
        </thead>
        <tbody id="splits-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- コース別分析 + 投球分布 -->
  <div class="chart-section">

    <!-- 指標タブ -->
    <div style="margin-bottom:12px">
      <div class="tab-group" role="tablist">
        <button class="tab-btn active" data-stat="ba"    role="tab">被打率</button>
        <button class="tab-btn"        data-stat="whiff" role="tab">空振り率</button>
        <button class="tab-btn"        data-stat="gb"    role="tab">ゴロ率</button>
      </div>
    </div>

    <!-- 球種タブ -->
    <div style="margin-bottom:14px">
      <div style="font-size:11px;color:#888;margin-bottom:5px">球種フィルター</div>
      <div class="tab-group" id="pitch-type-tabs" role="tablist">
        <button class="tab-btn active" data-type="all" role="tab">全球種</button>
      </div>
    </div>

    <h3 id="zone-chart-title">コース別被打率</h3>

    <!-- L/R ゾーンチャート並列 -->
    <div class="split-charts-row">
      <div class="split-chart-col">
        <h4 class="vs-left">vs 左打者 <span id="vsL-count" style="font-weight:400;font-size:11px;color:#556;"></span></h4>
        <canvas id="zone-canvas-L" width="300" height="420"
          aria-label="vs左打者 コース別ヒートマップ"></canvas>
      </div>
      <div class="split-chart-col">
        <h4 class="vs-right">vs 右打者 <span id="vsR-count" style="font-weight:400;font-size:11px;color:#556;"></span></h4>
        <canvas id="zone-canvas-R" width="300" height="420"
          aria-label="vs右打者 コース別ヒートマップ"></canvas>
      </div>
    </div>

    <!-- L/R 投球散布図 -->
    <h3 style="margin-top:28px;margin-bottom:10px">投球分布</h3>

    <div class="pitch-toggles">
      <label class="toggle-label">
        <input type="checkbox" id="toggle-hit" checked>
        <span class="toggle-dot hit"></span>安打
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="toggle-swinging" checked>
        <span class="toggle-dot swinging"></span>空振り
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="toggle-weak" checked>
        <span class="toggle-dot weak"></span>凡打
      </label>
    </div>

    <div class="split-charts-row">
      <div class="split-chart-col">
        <h4 class="vs-left">vs 左打者</h4>
        <canvas id="pitch-canvas-L" width="280" height="400"
          aria-label="vs左打者 投球散布図"></canvas>
      </div>
      <div class="split-chart-col">
        <h4 class="vs-right">vs 右打者</h4>
        <canvas id="pitch-canvas-R" width="280" height="400"
          aria-label="vs右打者 投球散布図"></canvas>
      </div>
    </div>

    <!-- 球種凡例 -->
    <div class="shape-legend" id="shape-legend"></div>

  </div><!-- /chart-section -->

  <!-- 球種別データ -->
  <div class="card">
    <h2>球種別データ</h2>
    <div class="table-wrap">
      <table class="pitch-type-table">
        <thead>
          <tr>
            <th>球種</th>
            <th class="num">投球数</th>
            <th class="num">割合</th>
            <th class="num">vs左 割合</th>
            <th class="num">vs右 割合</th>
            <th class="num">空振り率</th>
            <th class="num">被打率</th>
          </tr>
        </thead>
        <tbody id="pitch-type-tbody"></tbody>
      </table>
    </div>
  </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"
  crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"
  integrity="sha512-dfX5uYVXzyU8+KHqj8bjo7UkOdg18PaOtpa48djpNbZHwExddghZ+ZmzWT06R5v6NSk3ZUfsH6FNEDepLx9hA=="
  crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="js/datastore.js"></script>
<script src="js/zoneChart.js"></script>
<script src="js/pitchPlot.js"></script>
<script src="js/pitcher.js"></script>
</body>
</html>
